<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <style>
    @keyframes pulse-gate {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 0.5; }
    }
    .gate-node { animation: pulse-gate 2.5s ease-in-out infinite; }
    @keyframes hub-breathe {
      0%, 100% { r: 11; }
      50% { r: 12.5; }
    }
    .hub { animation: hub-breathe 3s ease-in-out infinite; }
  </style>
  <defs>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="hub-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <filter id="hub-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#58a6ff" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="gate-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#f85149" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8b949e" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Shield shape -->
  <path d="M64,8 L112,28 L112,72 Q112,108 64,122 Q16,108 16,72 L16,28 Z"
        fill="url(#shield-fill)" stroke="url(#shield-grad)" stroke-width="3.5"/>

  <!-- Internal edges (directed) -->
  <g stroke="#8b949e" stroke-width="1.5" fill="none" opacity="0.6" marker-end="url(#arrow)">
    <line x1="42" y1="42" x2="55" y2="58"/>
    <line x1="86" y1="42" x2="73" y2="58"/>
    <line x1="44" y1="92" x2="56" y2="74"/>
    <line x1="84" y1="88" x2="72" y2="73"/>
  </g>

  <!-- Blocked edge (gate concept) -->
  <line x1="86" y1="42" x2="44" y2="92" stroke="#f85149" stroke-width="1.2" opacity="0.3" stroke-dasharray="3,4"/>

  <!-- Satellite nodes -->
  <circle cx="38" cy="38" r="6" fill="#2b6cb0" opacity="0.85"/>
  <circle cx="90" cy="38" r="6" fill="#553c9a" opacity="0.85"/>
  <circle cx="40" cy="95" r="6" fill="#276749" opacity="0.85"/>

  <!-- Gate node (danger) -->
  <circle cx="88" cy="91" r="6.5" fill="#da3633" class="gate-node" filter="url(#gate-glow)"/>

  <!-- Central hub node -->
  <circle cx="64" cy="65" r="11" fill="url(#hub-grad)" class="hub" filter="url(#hub-glow)"/>

  <!-- Hub inner detail -->
  <circle cx="64" cy="65" r="4" fill="#0d1117" opacity="0.6"/>
  <circle cx="64" cy="65" r="2" fill="#e6edf3" opacity="0.9"/>
</svg>
